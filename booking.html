<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book a Printing Service | Divine Imprints</title>
    <meta name="description" content="Book a Divine Imprints printing, binding, finishing, or packaging service by submitting your contact details and project requirement." />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://www.divine-imprints.com/booking.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Book a Printing Service | Divine Imprints" />
    <meta property="og:description" content="Submit your printing, binding, finishing, or packaging service requirement to Divine Imprints." />
    <meta property="og:url" content="https://www.divine-imprints.com/booking.html" />
    <meta property="og:image" content="https://www.divine-imprints.com/assets/divine-imprints-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Book a Printing Service | Divine Imprints" />
    <meta name="twitter:description" content="Submit your printing, binding, finishing, or packaging service requirement to Divine Imprints." />
    <meta name="twitter:image" content="https://www.divine-imprints.com/assets/divine-imprints-logo.png" />
    <link rel="stylesheet" href="styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ContactPage",
        "name": "Book a Printing Service",
        "url": "https://www.divine-imprints.com/booking.html",
        "description": "Booking form for Divine Imprints printing, binding, finishing, and packaging services.",
        "about": {
          "@type": "LocalBusiness",
          "name": "Divine Imprints",
          "telephone": "+91-8282828282",
          "url": "https://www.divine-imprints.com/"
        }
      }
    </script>
  </head>
  <body>
    <main class="booking-page">
      <div class="booking-inner">
        <p class="section-kicker">Booking Form</p>
        <h1>Book a Service</h1>
        <p>Fill your details and select the service you want. Divine Imprints can review the requirement and follow up with you.</p>
        <form class="booking-form" action="#" method="post">
          <label>
            Full Name
            <input name="name" type="text" autocomplete="name" required />
          </label>
          <label>
            Phone Number
            <input name="phone" type="tel" autocomplete="tel" required />
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" />
          </label>
          <label>
            Service
            <select name="service" required>
              <option value="">Select a service</option>
              <option>Book Printing</option>
              <option>Book Binding</option>
              <option>Offset Printing</option>
              <option>Finishing</option>
              <option>Packaging</option>
            </select>
          </label>
          <label class="full">
            Project Details
            <textarea name="details" placeholder="Share quantity, paper type, size, binding, finishing, deadline, or any other requirement."></textarea>
          </label>
          <div class="cta-row full">
            <button class="button" type="submit">Submit Request</button>
            <a class="button secondary" href="index.html">Back Home</a>
          </div>
        </form>
      </div>
    </main>
    <footer class="site-footer" id="contact" aria-labelledby="footer-contact-title">
      <div class="footer-inner">
        <div><h2 id="footer-contact-title">Contact Us</h2><p>Divine Imprints, Rajiv Book Binding House</p></div>
        <address class="footer-contact"><span>Delhi, India</span><span>Phone: <a href="tel:+918282828282">+91-8282828282</a></span><span>GSTIN: 07ACUPA7438A1ZP</span></address>
      </div>
    </footer>
  </body>
</html>
